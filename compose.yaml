services:
  lqosync:
    build:
      context: .
      dockerfile: Dockerfile
    image: lqosync:2.148.1-rc1
    container_name: lqosync
    restart: unless-stopped

    # Required because LQoSync calls host LibreQoS.py --updateonly and may control host services.
    # This is intentionally host-integrated, not isolated app-only Docker.
    privileged: true
    pid: host
    network_mode: host

    environment:
      SECRET_KEY: "change-this-generate-with-openssl-rand-hex-32"
      HOST: "0.0.0.0"
      PORT: "9202"
      CONFIG_PATH: "/opt/libreqos/src/config.json"
      USERS_PATH: "/opt/LQoSync/users.json"

      # Docker host-integrated mode. Uses nsenter to execute host systemctl and host LibreQoS.py.
      LQOSYNC_RUN_MODE: "host_nsenter"
      LQOSYNC_LIBREQOS_WORKING_DIR: "/opt/libreqos/src"
      HOST_CONTROL_MODE: "nsenter"
      LQOSYNC_USE_SUDO: "false"
      HOST_PYTHON: "/usr/bin/python3"
      NSENTER_BIN: "/usr/bin/nsenter"

      # Production-safe default: preserve existing live LibreQoS files.
      # For lab/factory reset only, change to overwrite_with_backup.
      LQOSYNC_INIT_POLICY: "preserve_existing"

    volumes:
      # LibreQoS managed files. LQoSync reads/writes config.json, ShapedDevices.csv, network.json here.
      - /opt/libreqos/src:/opt/libreqos/src

      # Persistent LQoSync runtime data.
      - /opt/LQoSync:/opt/LQoSync

      # Optional but useful for reading host journal/system context when host-integrated.
      - /run/systemd:/run/systemd:ro
      - /var/run/dbus:/var/run/dbus:ro
